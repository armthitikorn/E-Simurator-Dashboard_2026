<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Evaluator Pro | Multi-Clip Version</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --sidebar-width: 350px; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg); margin: 0; display: flex; height: 100vh; color: #1e293b; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #f1f5f9; }
        .filter-box { background: #f1f5f9; padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .filter-box input { padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-family: 'Sarabun'; }
        .user-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-item { padding: 12px; margin-bottom: 8px; border-radius: 10px; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; background: #fff; }
        .user-item:hover { border-color: var(--primary); background: #f0f7ff; }
        .user-item.active { border-color: var(--primary); background: #eff6ff; border-width: 2px; }

        /* Main Content */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .eval-card { background: white; width: 100%; max-width: 950px; border-radius: 20px; padding: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: none; }
        
        /* Section Styling */
        .section-container { margin-bottom: 25px; border: 1px solid #f1f5f9; border-radius: 15px; overflow: hidden; }
        .section-header { background: #f8fafc; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; }
        .section-title { font-weight: 700; color: var(--primary); }
        
        .clip-list { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .clip-row { display: grid; grid-template-columns: 80px 1fr 100px; gap: 15px; align-items: center; background: white; padding: 8px; border-radius: 8px; }
        .clip-label { font-size: 0.75rem; color: #64748b; font-weight: bold; }
        
        audio { height: 32px; width: 100%; }
        .score-box { text-align: right; }
        .score-input { width: 70px; padding: 8px; border: 2px solid #e2e8f0; border-radius: 8px; text-align: center; font-weight: bold; font-size: 1.1rem; }
        
        textarea { width: 100%; height: 80px; margin-top: 15px; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; font-family: 'Sarabun'; box-sizing: border-box; }
        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; }
        .btn-excel { background: #10b981; color: white; float: right; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2 style="margin:0; font-size: 1.2rem;">Evaluator <span style="color:var(--primary)">System</span></h2>
        <div class="filter-box">
            <input type="text" id="searchId" placeholder="ค้นหา User ID...">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                <input type="date" id="startDate">
                <input type="date" id="endDate">
            </div>
            <button class="btn" style="background:var(--primary); color:white;" onclick="fetchUsers()">🔍 กรองรายชื่อ</button>
        </div>
    </div>
    <div id="userList" class="user-list"></div>
</div>

<div class="main-content">
    <div id="emptyState" style="text-align:center; margin-top:100px; color:#94a3b8;">
        <h2>กรุณาเลือก User เพื่อเริ่มการประเมิน</h2>
    </div>

    <div id="evalCard" class="eval-card">
        <button class="btn btn-excel" onclick="exportToExcel()">📊 Export Excel</button>
        <h1 id="displayId" style="margin:0; font-size: 1.4rem;">User ID: ---</h1>
        <p id="displayDate" style="color:#64748b; margin-bottom: 25px;">วันที่อัปโหลด: --</p>

        <div id="sectionsWrapper">
            </div>

        <h3 style="margin-top:20px; font-size: 1rem;">ข้อเสนอแนะเพิ่มเติม</h3>
        <textarea id="comment" placeholder="ระบุความคิดเห็นที่นี่..."></textarea>

        <div style="margin-top:25px; padding-top:20px; border-top: 2px solid #f1f5f9; display:flex; justify-content:space-between; align-items:center;">
            <div style="font-size: 1.5rem; font-weight: 700;">
                คะแนนรวม: <span id="totalScore" style="color:var(--primary)">0</span> / 50
            </div>
            <span style="color:#94a3b8; font-size: 0.8rem;">ระบบดึงไฟล์อัตโนมัติจาก Storage</span>
        </div>
    </div>
</div>
<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabaseUrl = 'https://wzwyotzzxycqfwercakh.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6d3lvdHp6eHljcWZ3ZXJjYWtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwNTg3MTMsImV4cCI6MjA3MjYzNDcxM30.lgiAf9oBUqsaWGb3u_80wuoKAODQHE_lIBxpGumhrno'; 
    const supabase = createClient(supabaseUrl, supabaseKey);

    // เพิ่มฟิลด์เก็บชื่อพนักงาน
    let currentEval = { id: '', name: '', scores: { S1:0, S2:0, S3:0, S4:0, S5:0 }, date: '', fullTime: '' };

async function fetchUsers() {
    const listEl = document.getElementById('userList');
    const search = document.getElementById('searchId').value.toLowerCase();
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;

    listEl.innerHTML = 'กำลังประมวลผลรายชื่อ...';
    
    try {
        // 1. ดึง Folder จาก Storage (Bucket: responses)
        const { data: folders } = await supabase.storage.from('responses').list('');

        // 2. ดึงชื่อจากตารางพื้นฐาน (submissions) แทนตาราง View
        const { data: subData, error: dbError } = await supabase
            .from('submissions')
            .select('user_id, name');

        if (dbError) {
            console.log("Database Info:", dbError.message);
        }

        // สร้างระบบ Mapping ชื่อ
        const nameMap = new Map();
        if (subData) {
            subData.forEach(item => {
                if (item.user_id && item.name) {
                    nameMap.set(String(item.user_id).toLowerCase().trim(), item.name.trim());
                }
            });
        }

        listEl.innerHTML = '';
        for (const folder of folders) {
            if (folder.name === '.emptyFolderPlaceholder') continue;

            // ดึงไฟล์ใน S1 เพื่อเอาวันที่
            const { data: files } = await supabase.storage.from('responses').list(`${folder.name}/S1`);
            
            if (files && files.length > 0) {
                const fDate = new Date(files[0].created_at);
                const fDateStr = fDate.toISOString().split('T')[0];
                const folderKey = String(folder.name).toLowerCase().trim();
                
                // ดึงชื่อจากตาราง submissions มาแสดง
                const displayName = nameMap.get(folderKey) || folder.name;

                // ระบบ Filter
                if (search && !displayName.toLowerCase().includes(search) && !folder.name.toLowerCase().includes(search)) continue;
                if ((start && fDateStr < start) || (end && fDateStr > end)) continue;

                const item = document.createElement('div');
                item.className = 'user-item';
                item.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px;">
                        <div style="background:#2563eb; color:white; width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; flex-shrink:0;">
                            ${displayName.charAt(0)}
                        </div>
                        <div style="overflow:hidden;">
                            <strong style="display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${displayName}</strong>
                            <small style="color:#64748b;">📅 ${fDate.toLocaleDateString('th-TH')}</small>
                        </div>
                    </div>
                `;
                item.onclick = () => {
                    document.querySelectorAll('.user-item').forEach(e => e.classList.remove('active'));
                    item.classList.add('active');
                    loadUser(folder.name, displayName, fDate.toLocaleDateString('th-TH'));
                };
                listEl.appendChild(item);
            }
        }
    } catch (e) {
        console.error("Fetch Error:", e);
        listEl.innerHTML = 'ไม่สามารถโหลดข้อมูลได้';
    }
}

    async function loadUser(userId, fullName, fullTime) {
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('evalCard').style.display = 'block';
        
        // แสดงชื่อจริงแทน ID ในหัวข้อหลัก
        document.getElementById('displayId').innerText = `พนักงาน: ${fullName}`;
        document.getElementById('displayDate').innerText = `เวลาส่งงาน: ${fullTime} (ID: ${userId})`;
        
        const wrapper = document.getElementById('sectionsWrapper');
        wrapper.innerHTML = '🔄 กำลังโหลดไฟล์เสียง...';
        
        currentEval = { 
            id: userId, 
            name: fullName, 
            scores: { S1:0, S2:0, S3:0, S4:0, S5:0 }, 
            date: fullTime.split(' ')[0],
            fullTime: fullTime
        };

        const sections = ['S1', 'S2', 'S3', 'S4', 'S5'];
        wrapper.innerHTML = '';

        for (const s of sections) {
            const { data: files } = await supabase.storage.from('responses').list(`${userId}/${s}`);
            const webmFiles = files ? files.filter(f => f.name.endsWith('.webm')) : [];
            
            const secDiv = document.createElement('div');
            secDiv.className = 'section-container';
            secDiv.innerHTML = `
                <div class="section-header">
                    <span class="section-title">หัวข้อ ${s}</span>
                    <div class="score-box">
                        <input type="number" class="score-input" min="0" max="10" value="0" oninput="updateScore('${s}', this.value)">
                    </div>
                </div>
                <div class="clip-list" id="list-${s}"></div>
            `;
            wrapper.appendChild(secDiv);

            const clipList = document.getElementById(`list-${s}`);
            if (webmFiles.length === 0) {
                clipList.innerHTML = '<small style="color:#94a3b8; padding:10px;">ไม่พบไฟล์</small>';
            } else {
                webmFiles.forEach((file, index) => {
                    const { data: { publicUrl } } = supabase.storage.from('responses').getPublicUrl(`${userId}/${s}/${file.name}`);
                    const clipRow = document.createElement('div');
                    clipRow.className = 'clip-row';
                    clipRow.innerHTML = `
                        <div class="clip-label">CLIP ${index + 1}</div>
                        <audio controls src="${publicUrl}"></audio>
                    `;
                    clipList.appendChild(clipRow);
                });
            }
        }
        updateTotal();
    }

    // ฟังก์ชัน Export Excel ที่รวมชื่อพนักงานเข้าไปด้วย
    window.exportToExcel = () => {
        const data = [{
            "ชื่อพนักงาน": currentEval.name,
            "User ID": currentEval.id,
            "เวลาที่ส่งงาน": currentEval.fullTime,
            "S1": currentEval.scores.S1,
            "S2": currentEval.scores.S2,
            "S3": currentEval.scores.S3,
            "S4": currentEval.scores.S4,
            "S5": currentEval.scores.S5,
            "คะแนนรวม": document.getElementById('totalScore').innerText,
            "ความคิดเห็น": document.getElementById('comment').value
        }];
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "ผลการประเมิน");
        XLSX.writeFile(wb, `ประเมิน_${currentEval.name}.xlsx`);
    }

    window.updateScore = (s, val) => {
        currentEval.scores[s] = parseInt(val) || 0;
        updateTotal();
    }

    function updateTotal() {
        const total = Object.values(currentEval.scores).reduce((a,b) => a+b, 0);
        document.getElementById('totalScore').innerText = total;
    }

    window.onload = fetchUsers;
</script>
</body>
</html>
