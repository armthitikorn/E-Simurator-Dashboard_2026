<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard ประเมินผลพนักงาน (New Version)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 350px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .p-4 { padding: 1.5rem; }
        .search-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .user-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s; }
        .user-item:hover { background: #f1f7ff; }
        .user-item.active { background: #eef2ff; border-left: 4px solid var(--primary); }

        /* Main Content */
        .main { flex: 1; overflow-y: auto; padding: 30px; }
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .section-box { border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        
        /* ปรับปรุงขนาดช่องเลือกคะแนน */
        .score-input { padding: 6px 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-family: 'Sarabun', sans-serif; font-size: 15px; background-color: #fff; cursor: pointer; }
        .btn-export { background: #10b981; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: background 0.2s; }
        .btn-export:hover { background: #059669; }
        audio { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="p-4">
            <h2 style="margin:0 0 15px 0; color:var(--primary);">รายชื่อพนักงาน</h2>
            <input type="text" id="searchName" class="search-input" placeholder="ค้นหาชื่อพนักงาน..." oninput="filterList()">
            <input type="date" id="searchDate" class="search-input" onchange="filterList()">
        </div>
        <div id="userList" class="user-list"></div>
    </div>

    <div class="main">
        <div id="emptyState" style="text-align:center; margin-top:100px; color:#94a3b8;">
            <h2>กรุณาเลือกพนักงานจากแถบด้านซ้าย</h2>
        </div>

        <div id="evalCard" class="card" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px;">
                <div>
                    <h1 id="displayName" style="margin:0;">-</h1>
                    <p id="displayId" style="color:#64748b; margin:5px 0; font-size:0.9rem;"></p>
                </div>
                <div style="text-align:right;">
                    <div style="font-size:1.5rem; font-weight:bold; color:var(--primary);">คะแนนรวม: <span id="totalScore">0</span> / 25</div>
                </div>
            </div>

            <div id="audioSections"></div>

            <div style="margin-top:20px;">
                <label><b>ข้อเสนอแนะเพิ่มเติม:</b></label>
                <textarea id="feedback" style="width:100%; height:80px; margin-top:10px; border-radius:8px; border:1px solid #cbd5e1; padding:10px; font-family:inherit;" placeholder="พิมพ์ข้อเสนอแนะสำหรับการประเมินครั้งนี้..."></textarea>
            </div>

            <div style="margin-top:20px; text-align:right;">
                <button class="btn-export" onclick="exportToExcel()">📊 ดาวน์โหลดรายงาน Excel</button>
            </div>
        </div>
    </div>

<script type="module">
    const supabaseUrl = 'https://wzwyotzzxycqfwercakh.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6d3lvdHp6eHljcWZ3ZXJjYWtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwNTg3MTMsImV4cCI6MjA3MjYzNDcxM30.lgiAf9oBUqsaWGb3u_80wuoKAODQHE_lIBxpGumhrno';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    let allSubmissions = [];
    let currentEmployee = null;
    let scores = { S1: 0, S2: 0, S3: 0, S4: 0, S5: 0 };

    async function loadEmployeeList() {
        const { data, error } = await supabase
            .from('submissions') // ใช้ตารางหลัก submissions ตามเดิม
            .select('user_id, name, created_at')
            .order('created_at', { ascending: false });

        if (error) {
            console.error("❌ พบข้อผิดพลาด:", error.message);
            document.getElementById('userList').innerHTML = `<div style="padding:10px; color:red;">Error: ${error.message}</div>`;
            return;
        }

        if (data) {
            const uniqueUsersMap = new Map();
            data.forEach(item => {
                if (!uniqueUsersMap.has(item.user_id)) {
                    uniqueUsersMap.set(item.user_id, item);
                }
            });
            
            allSubmissions = Array.from(uniqueUsersMap.values());
            renderList(allSubmissions);
        }
    }

    function renderList(items) {
        const listEl = document.getElementById('userList');
        listEl.innerHTML = '';
        
        if (!items || items.length === 0) {
            listEl.innerHTML = '<div style="padding:20px; text-align:center; color:#94a3b8;">ไม่พบรายชื่อพนักงาน</div>';
            return;
        }

        items.forEach(emp => {
            const date = new Date(emp.created_at).toLocaleDateString('th-TH');
            const item = document.createElement('div');
            item.className = 'user-item';
            const displayName = emp.name || `ID: ${emp.user_id.substring(0,8)}`;
            
            item.innerHTML = `
                <div style="display:flex; align-items:center; gap:10px;">
                    <div style="background:#2563eb; color:white; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.8rem; flex-shrink:0;">
                        ${displayName.charAt(0)}
                    </div>
                    <div style="overflow:hidden;">
                        <strong style="display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${displayName}</strong>
                        <small style="color:#64748b; font-size:0.75rem;">📅 ${date}</small>
                    </div>
                </div>
            `;
            item.onclick = () => {
                document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
                item.classList.add('active');
                selectEmployee(emp);
            };
            listEl.appendChild(item);
        });
    }

    window.filterList = () => {
        const name = document.getElementById('searchName').value.toLowerCase();
        const date = document.getElementById('searchDate').value;
        const filtered = allSubmissions.filter(emp => {
            const matchName = emp.name.toLowerCase().includes(name);
            const matchDate = !date || emp.created_at.includes(date);
            return matchName && matchDate;
        });
        renderList(filtered);
    }

    async function selectEmployee(emp) {
        currentEmployee = emp;
        scores = { S1: 0, S2: 0, S3: 0, S4: 0, S5: 0 }; // เริ่มต้นที่ 0 เพื่อให้ผู้ประเมินต้องกดเลือกคะแนนเอง
        document.getElementById('totalScore').innerText = '0';
        document.getElementById('feedback').value = '';
        
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('evalCard').style.display = 'block';
        document.getElementById('displayName').innerText = emp.name;
        document.getElementById('displayId').innerText = `ID: ${emp.user_id}`;

        const sectionsContainer = document.getElementById('audioSections');
        sectionsContainer.innerHTML = '<div style="text-align:center; padding: 20px;">🔄 กำลังโหลดไฟล์เสียงทั้งหมด กรุณารอสักครู่...</div>';

        let html = '';
        const steps = ['S1', 'S2', 'S3', 'S4', 'S5'];
        const stepNames = {
            'S1': 'เปิดตัว / แนะนำตัว',
            'S2': 'ตอบคำถามลูกค้า',
            'S3': 'ปิดการขาย / ตอบข้อโต้แย้ง',
            'S4': 'ซักประวัติสุขภาพ',
            'S5': 'ลงทะเบียน'
        };

        for (const s of steps) {
            const { data: files } = await supabase.storage.from('responses').list(`${emp.user_id}/${s}`);
            const audioFiles = files?.filter(f => f.name.endsWith('.webm') || f.name.endsWith('.mp3')) || [];

            let audioTags = '';
            if (audioFiles.length > 0) {
                audioFiles.forEach((file, index) => {
                    const { data: { publicUrl } } = supabase.storage.from('responses').getPublicUrl(`${emp.user_id}/${s}/${file.name}`);
                    audioTags += `
                        <div style="margin-top: 10px; padding: 10px; background-color: #f8fafc; border-radius: 8px;">
                            <small style="color:#64748b; font-weight: bold;">🔊 ไฟล์เสียงที่ ${index + 1}</small>
                            <audio controls src="${publicUrl}" style="width: 100%; margin-top: 5px; outline: none;"></audio>
                        </div>
                    `;
                });
            } else {
                audioTags = '<p style="color:#94a3b8; margin-top: 15px;">ไม่พบไฟล์เสียงในหัวข้อนี้</p>';
            }

            // เปลี่ยนจาก Input Number เป็น Dropdown Select 1-5
            html += `
                <div class="section-box">
                    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px dashed #e2e8f0; padding-bottom: 10px;">
                        <span style="font-weight:600; font-size: 1.1em; color: var(--primary);">หัวข้อ ${s} : ${stepNames[s]} <span style="font-size: 0.8em; color: #64748b;">(${audioFiles.length} ไฟล์)</span></span>
                        <div>
                            <span style="margin-right: 10px; font-weight: bold; color: #333;">ให้คะแนน:</span>
                            <select class="score-input" onchange="updateScore('${s}', this.value)">
                                <option value="0">-- เลือกคะแนน --</option>
                                <option value="1">1 - ต้องปรับปรุงเร่งด่วน</option>
                                <option value="2">2 - ต้องปรับปรุง</option>
                                <option value="3">3 - ปานกลาง</option>
                                <option value="4">4 - ดี</option>
                                <option value="5">5 - ดีเยี่ยม</option>
                            </select>
                        </div>
                    </div>
                    ${audioTags}
                </div>
            `;
        }
        sectionsContainer.innerHTML = html;
    }

    window.updateScore = (s, val) => {
        scores[s] = parseInt(val) || 0;
        const total = Object.values(scores).reduce((a, b) => a + b, 0);
        document.getElementById('totalScore').innerText = total;
    }

    // ปรับปรุงฟังก์ชันการ Export Excel ให้มีคอลัมน์ชัดเจนขึ้น
    window.exportToExcel = () => {
        const data = [{
            "ชื่อพนักงาน": currentEmployee.name,
            "รหัสอ้างอิง (User ID)": currentEmployee.user_id,
            "วันที่ส่งงาน": new Date(currentEmployee.created_at).toLocaleString('th-TH'),
            "S1 (แนะนำตัว)": scores.S1, 
            "S2 (ตอบคำถาม)": scores.S2, 
            "S3 (ปิดการขาย)": scores.S3, 
            "S4 (ซักประวัติ)": scores.S4, 
            "S5 (ลงทะเบียน)": scores.S5,
            "คะแนนรวม (เต็ม 25)": document.getElementById('totalScore').innerText,
            "ข้อเสนอแนะเพิ่มเติม": document.getElementById('feedback').value,
            "วันที่ประเมิน": new Date().toLocaleString('th-TH')
        }];
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "สรุปผลการประเมิน");
        XLSX.writeFile(wb, `สรุปประเมิน_${currentEmployee.name}.xlsx`);
    }

    window.onload = loadEmployeeList;
</script>
</body>
</html>
